name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.4.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Prepare release APK
        run: |
          mkdir -p release-apk
          cp app/build/outputs/apk/debug/*.apk "release-apk/CipherAlphabetApp-${RELEASE_TAG}-debug.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: CipherAlphabetApp ${{ env.RELEASE_TAG }}
          body: |
            Автоматически собранный debug APK.

            Release APK signing будет добавлен позже.

            Подробности изменений смотрите в CHANGELOG.md.
          files: release-apk/CipherAlphabetApp-${{ env.RELEASE_TAG }}-debug.apk
